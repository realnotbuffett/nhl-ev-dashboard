<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL EV Bot — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #06090f;
    --bg-card: #0d1117;
    --bg-card-hover: #131921;
    --border: #1b2332;
    --border-bright: #253045;
    --text-primary: #e2e8f0;
    --text-secondary: #8892a4;
    --text-dim: #4a5568;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.08);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.08);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.08);
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 42px; height: 42px; background: linear-gradient(135deg, var(--blue), var(--cyan)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: white; letter-spacing: -1px; font-family: 'JetBrains Mono', monospace; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--text-secondary); font-weight: 400; font-size: 15px; margin-left: 8px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .status-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .status-pill.live { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .status-pill.offline { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
  .status-pill.live .status-dot { background: var(--green); }
  .status-pill.offline .status-dot { background: var(--red); animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
  .updated-text { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; transition: border-color 0.2s; }
  .stat-card:hover { border-color: var(--border-bright); }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
  .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .section { margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
  .section-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .scoreboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .score-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color 0.2s; }
  .score-card:hover { border-color: var(--border-bright); }
  .score-card.is-live { border-color: var(--green); animation: live-glow 3s ease-in-out infinite; }
  @keyframes live-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } 50% { box-shadow: 0 0 8px 0 rgba(34,197,94,0.15); } }
  .score-card.has-bet-card { border-left: 3px solid var(--cyan); }
  .score-state { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
  .score-state.final { color: var(--text-dim); }
  .score-state.live { color: var(--green); }
  .score-state.upcoming { color: var(--amber); }
  .score-teams { display: flex; flex-direction: column; gap: 6px; }
  .score-team-row { display: flex; justify-content: space-between; align-items: center; }
  .score-team-name { font-size: 15px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .score-team-name.winner { color: var(--green); }
  .score-team-score { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .score-team-score.winner { color: var(--green); }
  .score-start { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); }
  .score-bet-tag { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,0.15); font-family: 'JetBrains Mono', monospace; }
  .games-list { display: flex; flex-direction: column; gap: 8px; }
  .game-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 16px; transition: border-color 0.2s, background 0.2s; }
  .game-row:hover { border-color: var(--border-bright); background: var(--bg-card-hover); }
  .game-row.has-bet { border-left: 3px solid var(--green); }
  .game-matchup { display: flex; flex-direction: column; gap: 2px; }
  .game-teams { font-size: 15px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .game-id { font-size: 11px; color: var(--text-dim); }
  .game-probs { text-align: center; }
  .prob-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .prob-values { font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .game-ev { text-align: center; min-width: 70px; }
  .ev-value { font-size: 15px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .ev-positive { color: var(--green); }
  .ev-negative { color: var(--text-dim); }
  .ev-team { font-size: 10px; color: var(--text-secondary); }
  .game-goalie { min-width: 90px; text-align: center; }
  .goalie-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .goalie-confirmed { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.15); }
  .goalie-partial { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.15); }
  .goalie-none { background: rgba(255,255,255,0.03); color: var(--text-dim); border: 1px solid var(--border); }
  .bets-list { display: flex; flex-direction: column; gap: 8px; }
  .bet-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: grid; grid-template-columns: 1fr auto auto auto auto auto; align-items: center; gap: 16px; }
  .bet-row.win { border-left: 3px solid var(--green); }
  .bet-row.loss { border-left: 3px solid var(--red); }
  .bet-row.pending { border-left: 3px solid var(--amber); }
  .bet-team { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .bet-matchup { font-size: 11px; color: var(--text-secondary); }
  .bet-detail { text-align: center; }
  .bet-detail-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .bet-detail-value { font-size: 14px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .bet-time { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .result-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .result-win { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .result-loss { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .result-pending { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }
  .footer { text-align: center; padding: 24px 0; border-top: 1px solid var(--border); margin-top: 16px; }
  .footer p { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  @media (max-width: 700px) {
    .game-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .bet-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .header h1 span { display: none; }
    .stat-value { font-size: 24px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .scoreboard-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .scoreboard-grid { grid-template-columns: 1fr 1fr; }
    .container { padding: 12px 10px 30px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
var DATA = {};

function timeAgo(isoStr) {
  if (!isoStr) return "never";
  var diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h " + Math.floor((diff%3600)/60) + "m ago";
  return Math.floor(diff/86400) + "d ago";
}

function formatTime(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatStartTime(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function isRecent(isoStr, minutes) {
  if (!isoStr) return false;
  return (Date.now() - new Date(isoStr).getTime()) < (minutes || 20) * 60 * 1000;
}

function getStateLabel(state, period, periodType) {
  if (state === "LIVE" || state === "CRIT") {
    var label = "LIVE";
    if (period) {
      var pNum = parseInt(period);
      if (periodType === "OT") label = "OT";
      else if (periodType === "SO") label = "SO";
      else if (pNum === 1) label = "1ST";
      else if (pNum === 2) label = "2ND";
      else if (pNum === 3) label = "3RD";
      else label = "LIVE";
    }
    return label;
  }
  if (state === "FINAL" || state === "OFF") {
    if (periodType === "OT") return "FINAL/OT";
    if (periodType === "SO") return "FINAL/SO";
    return "FINAL";
  }
  if (state === "FUT" || state === "PRE") return "UPCOMING";
  return state;
}

function calcPerformance(bets) {
  var wins = 0, losses = 0, pending = 0, cumProfit = 0;
  for (var i = 0; i < bets.length; i++) {
    var b = bets[i];
    if (b.result === "WIN") {
      wins++;
      cumProfit += (1 / parseFloat(b.pm_price || 1)) - 1;
    } else if (b.result === "LOSS") {
      losses++;
      cumProfit -= 1;
    } else {
      pending++;
    }
  }
  var settled = wins + losses;
  var winRate = settled > 0 ? (wins / settled * 100).toFixed(1) : "0.0";
  var roi = settled > 0 ? (cumProfit / settled * 100).toFixed(1) : "0.0";
  return {
    wins: wins,
    losses: losses,
    pending: pending,
    cumulative_profit: Math.round(cumProfit * 100) / 100,
    win_rate: winRate,
    roi: roi
  };
}

function render() {
  var app = document.getElementById("app");
  var d = DATA;
  if (!d || !d.last_updated) {
    app.innerHTML = '<div class="empty-state" style="padding:80px 20px"><div class="icon">&#127954;</div><p>Loading dashboard data...</p><p style="margin-top:8px;font-size:11px">If this persists, the bot may not have pushed data yet.</p></div>';
    return;
  }
  var stats = d.stats || {};
  var bets = d.bets || [];
  var perf = calcPerformance(bets);
  var botActive = isRecent(d.last_updated);
  var games = d.all_games || [];
  var scoreboard = d.scoreboard || [];

  var betTeamsToday = {};
  for (var i = 0; i < bets.length; i++) {
    if (bets[i].game_date === d.today) betTeamsToday[bets[i].team] = true;
  }

  var sortedGames = games.slice().sort(function(a, b) {
    var ac = a.goalies_confirmed === "True" ? 1 : 0;
    var bc = b.goalies_confirmed === "True" ? 1 : 0;
    if (bc !== ac) return bc - ac;
    return parseFloat(b.best_ev || 0) - parseFloat(a.best_ev || 0);
  });

  var stateOrder = {"LIVE":0, "CRIT":0, "FUT":1, "PRE":1, "FINAL":2, "OFF":2};
  var sortedScoreboard = scoreboard.slice().sort(function(a, b) {
    var ao = stateOrder[a.state] !== undefined ? stateOrder[a.state] : 3;
    var bo = stateOrder[b.state] !== undefined ? stateOrder[b.state] : 3;
    return ao - bo;
  });

  var totalBetsToday = stats.total_bets_today || 0;
  var totalBetsAll = stats.total_bets_all_time || bets.length;
  var confirmedGames = games.filter(function(g) { return g.goalies_confirmed === "True"; }).length;
  var profit = perf.cumulative_profit;
  var profitColor = profit >= 0 ? 'var(--green)' : 'var(--red)';
  var profitSign = profit >= 0 ? '+' : '';
  var liveCount = scoreboard.filter(function(g) { return g.state === "LIVE" || g.state === "CRIT"; }).length;
  var finalCount = scoreboard.filter(function(g) { return g.state === "FINAL" || g.state === "OFF"; }).length;

  var h = '';
  h += '<div class="header">';
  h += '<div class="header-left"><div class="logo">EV</div><h1>NHL EV Bot <span>Dashboard</span></h1></div>';
  h += '<div class="header-right">';
  h += '<span class="status-pill ' + (botActive ? 'live' : 'offline') + '"><span class="status-dot"></span>' + (botActive ? 'Bot Active' : 'Bot Idle') + '</span>';
  h += '<span class="updated-text">Updated ' + timeAgo(d.last_updated) + '</span>';
  h += '</div></div>';

  h += '<div class="stats-row">';
  h += '<div class="stat-card"><div class="stat-label">Cumulative Profit</div><div class="stat-value" style="color:' + profitColor + '">' + profitSign + '$' + Math.abs(profit).toFixed(2) + '</div><div class="stat-sub">$1.00 per bet</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Record</div><div class="stat-value" style="font-size:22px">' + perf.wins + 'W - ' + perf.losses + 'L</div><div class="stat-sub">' + perf.pending + ' pending</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" style="color:' + (parseFloat(perf.win_rate) >= 50 ? 'var(--green)' : 'var(--text-primary)') + '">' + perf.win_rate + '%</div><div class="stat-sub">' + totalBetsAll + ' total bets</div></div>';
  h += '<div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value" style="font-size:22px;color:' + (parseFloat(perf.roi) >= 0 ? 'var(--green)' : 'var(--red)') + '">' + (parseFloat(perf.roi) >= 0 ? '+' : '') + perf.roi + '%</div><div class="stat-sub">per bet avg</div></div>';
  h += '</div>';

  h += '<div class="stats-row">';
  h += '<div class="stat-card"><div class="stat-label">Last Run</div><div class="stat-value" style="font-size:18px">' + timeAgo(d.last_updated) + '</div><div class="stat-sub">' + formatTime(d.last_updated) + '</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Runs Today</div><div class="stat-value">' + (stats.runs_today || 0) + '</div><div class="stat-sub">every 15 min</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Bets Today</div><div class="stat-value" style="color:' + (totalBetsToday > 0 ? 'var(--green)' : 'var(--text-primary)') + '">' + totalBetsToday + '</div><div class="stat-sub">' + totalBetsAll + ' all time</div></div>';
  h += '<div class="stat-card"><div class="stat-label">Games Today</div><div class="stat-value">' + (scoreboard.length || games.length) + '</div><div class="stat-sub">' + (liveCount > 0 ? liveCount + ' live, ' : '') + finalCount + ' final</div></div>';
  h += '</div>';

  // Scoreboard
  h += '<div class="section"><div class="section-header"><span class="section-title">Scoreboard</span>';
  h += '<span class="section-badge" style="background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,0.15)">' + (d.today || '--') + '</span></div>';
  if (sortedScoreboard.length === 0) {
    h += '<div class="empty-state"><div class="icon">&#127954;</div><p>No games today</p></div>';
  } else {
    h += '<div class="scoreboard-grid">';
    for (var i = 0; i < sortedScoreboard.length; i++) {
      var g = sortedScoreboard[i];
      var isLive = g.state === "LIVE" || g.state === "CRIT";
      var isFinal = g.state === "FINAL" || g.state === "OFF";
      var isUpcoming = g.state === "FUT" || g.state === "PRE";
      var stateLabel = getStateLabel(g.state, g.period, g.period_type);
      var stateClass = isLive ? "live" : isFinal ? "final" : "upcoming";
      var hasBet = betTeamsToday[g.away] || betTeamsToday[g.home];
      var awayWin = isFinal && g.away_score !== null && g.home_score !== null && g.away_score > g.home_score;
      var homeWin = isFinal && g.away_score !== null && g.home_score !== null && g.home_score > g.away_score;

      h += '<div class="score-card ' + (isLive ? 'is-live' : '') + ' ' + (hasBet ? 'has-bet-card' : '') + '">';
      h += '<div class="score-state ' + stateClass + '">' + stateLabel + '</div>';
      h += '<div class="score-teams">';
      h += '<div class="score-team-row"><span class="score-team-name ' + (awayWin ? 'winner' : '') + '">' + g.away + '</span>';
      if (isUpcoming) {
        h += '</div>';
      } else {
        h += '<span class="score-team-score ' + (awayWin ? 'winner' : '') + '">' + (g.away_score !== null ? g.away_score : '-') + '</span></div>';
      }
      h += '<div class="score-team-row"><span class="score-team-name ' + (homeWin ? 'winner' : '') + '">' + g.home + '</span>';
      if (isUpcoming) {
        h += '<span class="score-start">' + formatStartTime(g.start_time) + '</span></div>';
      } else {
        h += '<span class="score-team-score ' + (homeWin ? 'winner' : '') + '">' + (g.home_score !== null ? g.home_score : '-') + '</span></div>';
      }
      h += '</div>';
      if (hasBet) h += '<div class="score-bet-tag">BET PLACED</div>';
      h += '</div>';
    }
    h += '</div>';
  }
  h += '</div>';

  // EV Analysis
  h += '<div class="section"><div class="section-header"><span class="section-title">EV Analysis</span>';
  h += '<span class="section-badge" style="background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,0.15)">' + confirmedGames + ' confirmed</span></div>';
  h += '<div class="games-list">';
  if (sortedGames.length === 0) {
    h += '<div class="empty-state"><div class="icon">&#128202;</div><p>No EV data \u2014 bot scans games before they start</p></div>';
  } else {
    for (var i = 0; i < sortedGames.length; i++) {
      var g = sortedGames[i];
      var bestEv = parseFloat(g.best_ev || 0);
      var evPct = (bestEv * 100).toFixed(1);
      var isPos = bestEv > 0.04;
      var hasBet = g.bet_placed === "YES";
      var conf = g.goalies_confirmed === "True";
      var cc = parseInt(g.confirmed_count || 0);
      var gc = 'goalie-none', gt = cc + '/2';
      if (conf) { gc = 'goalie-confirmed'; gt = '&#10003; CONFIRMED'; }
      else if (cc > 0) { gc = 'goalie-partial'; gt = cc + '/2'; }
      var ap = (parseFloat(g.mp_away_prob || 0) * 100).toFixed(1);
      var hp = (parseFloat(g.mp_home_prob || 0) * 100).toFixed(1);
      var aPr = g.pm_away_price ? '$' + parseFloat(g.pm_away_price).toFixed(2) : '--';
      var hPr = g.pm_home_price ? '$' + parseFloat(g.pm_home_price).toFixed(2) : '--';
      h += '<div class="game-row ' + (hasBet ? 'has-bet' : '') + '">';
      h += '<div class="game-matchup"><div class="game-teams">' + g.away + (betTeamsToday[g.away] ? ' <span style="color:#22c55e;font-size:0.7em;font-weight:600">- bet</span>' : '') + ' @ ' + g.home + (betTeamsToday[g.home] ? ' <span style="color:#22c55e;font-size:0.7em;font-weight:600">- bet</span>' : '') + '</div><div class="game-id">ID: ' + (g.game_id || '--') + '</div></div>';
      h += '<div class="game-probs"><div class="prob-label">MoneyPuck</div><div class="prob-values">' + ap + '% / ' + hp + '%</div>';
      h += '<div class="prob-label" style="margin-top:4px">Polymarket</div><div class="prob-values">' + aPr + ' / ' + hPr + '</div></div>';
      h += '<div class="game-ev"><div class="ev-value ' + (isPos ? 'ev-positive' : 'ev-negative') + '">' + (bestEv > 0 ? '+' : '') + evPct + '%</div><div class="ev-team">' + (g.best_ev_team || '') + '</div></div>';
      h += '<div class="game-goalie"><span class="goalie-badge ' + gc + '">' + gt + '</span></div>';
      h += '</div>';
    }
  }
  h += '</div></div>';

  // Bets Placed
  h += '<div class="section"><div class="section-header"><span class="section-title">Bets Placed</span>';
  h += '<span class="section-badge" style="background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.15)">' + bets.length + ' total</span></div>';
  h += '<div class="bets-list">';
  if (bets.length === 0) {
    h += '<div class="empty-state"><div class="icon">&#128176;</div><p>No bets placed yet</p></div>';
  } else {
    var sb = bets.slice().reverse();
    for (var i = 0; i < sb.length; i++) {
      var b = sb[i];
      var ev = (parseFloat(b.ev || 0) * 100).toFixed(1);
      var mp = (parseFloat(b.mp_prob || 0) * 100).toFixed(1);
      var pp = parseFloat(b.pm_price || 0).toFixed(2);
      var result = b.result || '';
      var rowClass = result === 'WIN' ? 'win' : result === 'LOSS' ? 'loss' : 'pending';
      var resultBadge = '<span class="result-badge result-pending">PENDING</span>';
      if (result === 'WIN') {
        var payout = ((1 / parseFloat(b.pm_price || 1)) - 1).toFixed(2);
        resultBadge = '<span class="result-badge result-win">WIN +$' + payout + '</span>';
      } else if (result === 'LOSS') {
        resultBadge = '<span class="result-badge result-loss">LOSS -$1.00</span>';
      }
      var scoreText = b.score ? ' (' + b.score + ')' : '';
      h += '<div class="bet-row ' + rowClass + '">';
      h += '<div><div class="bet-team">' + b.team + '</div><div class="bet-matchup">' + (b.matchup || '') + scoreText + '</div></div>';
      h += '<div class="bet-detail"><div class="bet-detail-label">EV</div><div class="bet-detail-value ev-positive">+' + ev + '%</div></div>';
      h += '<div class="bet-detail"><div class="bet-detail-label">MP Prob</div><div class="bet-detail-value">' + mp + '%</div></div>';
      h += '<div class="bet-detail"><div class="bet-detail-label">PM Price</div><div class="bet-detail-value">$' + pp + '</div></div>';
      h += '<div style="text-align:center">' + resultBadge + '</div>';
      h += '<div><div class="bet-time">' + (b.game_date || '') + '</div><div class="bet-time">' + formatTime(b.timestamp) + '</div></div>';
      h += '</div>';
    }
  }
  h += '</div></div>';
  h += '<div class="footer"><p>NHL EV Bot &#8226; Data from last bot run &#8226; Refresh page for latest</p></div>';
  app.innerHTML = h;
}

fetch("https://raw.githubusercontent.com/realnotbuffett/nhl-ev-dashboard/main/data.json?nocache=" + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(d) { DATA = d; render(); })
  .catch(function() { render(); });
</script>
</body>
</html>
